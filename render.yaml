services:
  - type: web
    name: cvjachai-api
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cvjachai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: API_KEY
        sync: false # You will need to add your Groq API key in Render Dashboard
      - key: PORT
        value: 8000
    # The Dockerfile handles migration and starting the server

databases:
  - name: cvjachai-db
    plan: free
